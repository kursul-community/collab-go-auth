name: Build and Deploy (K8s)

on:
  pull_request:
    branches:
      - dev
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.base_ref }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    runs-on: self-hosted
    needs: build-and-push
    if: ${{ github.base_ref == 'dev' }}
    environment: dev
    permissions:
      contents: read

    steps:
      - name: Validate SSH key secret (dev)
        shell: bash
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY_DEV || secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "Missing SSH private key secret for environment 'dev' (SSH_PRIVATE_KEY_DEV or SSH_PRIVATE_KEY)."
            exit 1
          fi

      - name: Upgrade Helm Chart (sha)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 45.132.177.32
          username: collab-user
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE_DEV || secrets.SSH_PASSPHRASE }}
          script: |
            helm upgrade --install auth-service \
              "$HOME/collab-k8s-infra-temp/charts/apps/auth-service" \
              -n collab \
              --atomic \
              --timeout 900s \
              --set image.tag=${{ github.sha }}

            kubectl -n collab rollout restart deploy/collab-go-auth

  deploy-main:
    runs-on: self-hosted
    needs: build-and-push
    if: ${{ github.base_ref == 'main' }}
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Validate SSH key secret (prod)
        shell: bash
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY_PROD || secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "Missing SSH private key secret for environment 'prod' (SSH_PRIVATE_KEY_PROD or SSH_PRIVATE_KEY)."
            exit 1
          fi

      - name: Upgrade Helm Chart (latest)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 213.171.26.208
          username: collab-user
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD || secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE_PROD || secrets.SSH_PASSPHRASE }}
          script: |
            helm upgrade --install auth-service "$HOME/collab-k8s-infra-temp/charts/apps/auth-service" -n collab --atomic --timeout 900s --set image.tag=latest
            kubectl -n collab rollout restart deploy/collab-go-auth

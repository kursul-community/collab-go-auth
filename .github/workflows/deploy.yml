name: Build and Deploy (K8s)

on:
  pull_request:
    branches:
      - dev
      - main

env:
  REGISTRY: ghcr.io
  # Имя образа в нижнем регистре
  IMAGE_NAME: ${{ github.repository }} 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=raw,value=latest

      # - name: Build and push
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     push: true
      #     tags: |
      #       ghcr.io/kursul-community/collab-go-auth:latest
      #       ghcr.io/kursul-community/collab-go-auth:${{ github.sha }}
      #     labels: ${{ steps.meta.outputs.labels }}
      #     # Кэширование для ускорения сборки
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

      - name: Build Image and export to tar
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:build
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
        
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with: 
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1        

  push-latest:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.base_ref == 'main' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push latest
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:build ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

  push-sha:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.base_ref == 'dev' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push sha
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:build ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}

  deploy-main:
    runs-on: ubuntu-latest
    needs: push-latest
    if: ${{ github.base_ref == 'main' }}
    permissions:
      contents: read

    steps:
      - name: Upgrade Helm Chart (latest)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 45.132.177.32
          username: collab-user
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          script: |
            helm upgrade --install auth-service "$HOME/collab-k8s-infra-temp/charts/apps/auth-service" -n collab --atomic --timeout 900s --set image.tag=latest
            kubectl -n collab rollout restart deploy/collab-go-auth
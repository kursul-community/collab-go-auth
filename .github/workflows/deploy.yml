name: Build and Deploy (K8s)

on:
  pull_request:
    branches:
      - dev
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.base_ref }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.base_ref == 'dev' }}
    environment: dev
    concurrency:
      group: deploy-auth-service-dev
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Validate SSH key secret (dev)
        shell: bash
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY_DEV || secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "Missing SSH private key secret for environment 'dev' (SSH_PRIVATE_KEY_DEV or SSH_PRIVATE_KEY)."
            exit 1
          fi

      - name: Upgrade Helm Chart (sha)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USERNAME }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE_DEV || secrets.SSH_PASSPHRASE }}
          command_timeout: 20m
          script: |
            set -e
            LOCK_FILE="/tmp/collab-k8s-infra-dev.lock"
            exec 9>"$LOCK_FILE"
            echo "⏳ Waiting for deploy lock: $LOCK_FILE"
            flock -w 1800 9
            echo "✅ Acquired deploy lock"

            EXPECTED_TAG="${{ github.sha }}"
            EXPECTED_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):${EXPECTED_TAG}"

            helm upgrade --install auth-service \
              "$HOME/collab-k8s-infra-temp/charts/apps/auth-service" \
              -n collab \
              --timeout 900s \
              --set "image.tag=${EXPECTED_TAG}"

            kubectl -n collab rollout status deploy/collab-go-auth --timeout=300s

            ACTUAL_IMAGE=$(kubectl -n collab get deploy collab-go-auth -o jsonpath='{.spec.template.spec.containers[0].image}')
            if [ "$ACTUAL_IMAGE" != "$EXPECTED_IMAGE" ]; then
              echo "❌ Image mismatch: deployed='$ACTUAL_IMAGE', expected='$EXPECTED_IMAGE'" >&2
              exit 1
            fi
            echo "✅ Verified deployed image: $ACTUAL_IMAGE"

  deploy-main:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.base_ref == 'main' }}
    environment: prod
    concurrency:
      group: deploy-auth-service-prod
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Validate SSH key secret (prod)
        shell: bash
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY_PROD || secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "Missing SSH private key secret for environment 'prod' (SSH_PRIVATE_KEY_PROD or SSH_PRIVATE_KEY)."
            exit 1
          fi

      - name: Upgrade Helm Chart (latest)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USERNAME }}
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD || secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE_PROD || secrets.SSH_PASSPHRASE }}
          command_timeout: 20m
          script: |
            set -e
            LOCK_FILE="/tmp/collab-k8s-infra-prod.lock"
            exec 9>"$LOCK_FILE"
            echo "⏳ Waiting for deploy lock: $LOCK_FILE"
            flock -w 1800 9
            echo "✅ Acquired deploy lock"

            helm upgrade --install auth-service "$HOME/collab-k8s-infra-temp/charts/apps/auth-service" \
              -n collab --timeout 900s --set image.tag=latest

            kubectl -n collab rollout status deploy/collab-go-auth --timeout=300s
            echo "✅ auth-service rolled out (image.tag=latest)"
